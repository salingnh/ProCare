name: Android APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, for example v1.0.0. If empty, uses manual-<run_number>.'
        required: false
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a pre-release.'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    env:
      APK_OUTPUT_DIR: app/build/outputs/apk/debug
      RELEASE_DIR: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            'platforms;android-36' \
            'build-tools;36.0.0' \
            'platform-tools'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew clean assembleDebug --no-configuration-cache --stacktrace

      - name: Prepare APK artifact
        id: package_apk
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_DIR"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            RELEASE_TAG="${{ inputs.tag_name }}"
          else
            RELEASE_TAG="manual-${GITHUB_RUN_NUMBER}"
          fi

          APK_SOURCE="$APK_OUTPUT_DIR/app-debug.apk"
          APK_NAME="ProCare-${RELEASE_TAG}.apk"
          APK_PATH="$RELEASE_DIR/$APK_NAME"

          cp "$APK_SOURCE" "$APK_PATH"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_apk.outputs.apk_name }}
          path: ${{ steps.package_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package_apk.outputs.release_tag }}
          APK_PATH: ${{ steps.package_apk.outputs.apk_path }}
        shell: bash
        run: |
          set -euo pipefail

          PRERELEASE_FLAG=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$APK_PATH" \
              --title "ProCare $RELEASE_TAG" \
              --generate-notes \
              $PRERELEASE_FLAG
          fi
