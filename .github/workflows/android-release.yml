name: Android APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, for example v1.0.0. If empty, uses manual-<run_number>.'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a pre-release.'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.41.9'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'

jobs:
  build-and-release:
    name: Build signed Flutter APK and publish release
    runs-on: ubuntu-latest

    env:
      APK_OUTPUT_DIR: build/app/outputs/flutter-apk
      RELEASE_DIR: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "platform-tools"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ runner.arch }}-stable-${{ env.FLUTTER_VERSION }}
          pub-cache: true
          pub-cache-key: flutter-pub-${{ runner.os }}-${{ runner.arch }}-stable-${{ env.FLUTTER_VERSION }}

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            RELEASE_TAG="${{ inputs.tag_name }}"
          else
            RELEASE_TAG="manual-${GITHUB_RUN_NUMBER}"
          fi

          VERSION_NAME="${RELEASE_TAG#v}"
          if [[ -z "$VERSION_NAME" ]]; then
            VERSION_NAME="1.0.0"
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Restore release keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          missing_secrets=()
          for secret_name in SIGNING_KEY_BASE64 KEY_STORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!secret_name}" ]]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if (( ${#missing_secrets[@]} > 0 )); then
            echo "Missing required signing secrets: ${missing_secrets[*]}"
            exit 1
          fi

          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

          if ! keytool -list \
            -keystore "$RUNNER_TEMP/release.jks" \
            -storepass "$KEY_STORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::KEY_ALIAS does not match any key entry in SIGNING_KEY_BASE64."
            exit 1
          fi

      - name: Build signed release APK
        env:
          GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: >
          flutter build apk --release
          --build-name="${{ steps.release.outputs.version_name }}"
          --build-number="${{ github.run_number }}"

      - name: Verify APK signature
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="$APK_OUTPUT_DIR/app-release.apk"
          if [[ ! -f "$APK_PATH" ]]; then
            echo "Release APK was not found."
            exit 1
          fi

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)
          "$APKSIGNER" verify --verbose "$APK_PATH"

      - name: Prepare APK artifact
        id: package_apk
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_DIR"

          RELEASE_TAG="${{ steps.release.outputs.release_tag }}"
          APK_NAME="NEWS2-L-${RELEASE_TAG}-signed.apk"
          APK_PATH="$RELEASE_DIR/$APK_NAME"

          cp "$APK_OUTPUT_DIR/app-release.apk" "$APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_apk.outputs.apk_name }}
          path: ${{ steps.package_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          APK_PATH: ${{ steps.package_apk.outputs.apk_path }}
        shell: bash
        run: |
          set -euo pipefail

          IS_PRERELEASE="false"
          PRERELEASE_FLAG=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.prerelease }}" == "true" ]]; then
            IS_PRERELEASE="true"
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --prerelease="$IS_PRERELEASE"
            gh release upload "$RELEASE_TAG" "$APK_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$APK_PATH" \
              --title "NEWS2-L $RELEASE_TAG" \
              --generate-notes \
              $PRERELEASE_FLAG
          fi
